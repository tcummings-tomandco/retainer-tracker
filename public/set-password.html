<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Your Password — Retainer Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0f4f8; --surface: #ffffff; --border: #e2e8f0;
    --text: #1e293b; --muted: #64748b; --blue: #3b82f6;
    --red: #ef4444; --green: #10b981;
  }
  body {
    font-family: system-ui,-apple-system,sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 40px 44px; width: 100%; max-width: 420px;
    box-shadow: 0 4px 32px rgba(0,0,0,.08);
  }
  .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
  .logo-icon {
    width: 40px; height: 40px; background: var(--blue); border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 16px; color: #fff; flex-shrink: 0;
  }
  .logo-text { font-weight: 700; font-size: 17px; line-height: 1.2; }
  .logo-sub  { font-size: 12px; color: var(--muted); }

  h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.5; }

  .field { margin-bottom: 18px; }
  label {
    display: block; font-size: 11px; font-weight: 600; color: var(--muted);
    margin-bottom: 7px; text-transform: uppercase; letter-spacing: .6px;
  }
  input {
    width: 100%; padding: 11px 14px;
    border: 1px solid var(--border); border-radius: 8px;
    font-size: 14px; color: var(--text); background: var(--surface);
    outline: none; transition: border-color .15s;
  }
  input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px #3b82f620; }

  .strength-bar { margin-top: 6px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .strength-fill { height: 100%; border-radius: 2px; transition: width .2s, background .2s; width: 0; }

  .btn {
    width: 100%; padding: 12px; background: var(--blue); color: #fff;
    border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
    cursor: pointer; margin-top: 4px; transition: background .15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn:hover    { background: #2563eb; }
  .btn:disabled { background: #93c5fd; cursor: not-allowed; }

  .msg {
    margin-top: 16px; padding: 11px 14px; border-radius: 8px;
    font-size: 13px; display: none;
  }
  .msg.error   { background: #fef2f2; border: 1px solid #fca5a5; color: var(--red); }
  .msg.success { background: #f0fdf4; border: 1px solid #86efac; color: #15803d; }

  .spinner {
    width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.4);
    border-top-color: #fff; border-radius: 50%;
    animation: spin .7s linear infinite; display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .invalid-state { text-align: center; padding: 24px 0; }
  .invalid-state p { color: var(--muted); font-size: 14px; margin-bottom: 16px; line-height: 1.5; }
  .invalid-state a { color: var(--blue); text-decoration: none; font-weight: 600; }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">R</div>
    <div>
      <div class="logo-text">Retainer Tracker</div>
      <div class="logo-sub">by Tom &amp; Co</div>
    </div>
  </div>

  <div id="formWrap">
    <h2>Set your password</h2>
    <p class="subtitle">Choose a password to activate your account and access the retainer dashboard.</p>

    <form id="setPasswordForm">
      <div class="field">
        <label for="password">New password</label>
        <input type="password" id="password" placeholder="At least 8 characters" required
               autocomplete="new-password" oninput="checkStrength()">
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      </div>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" placeholder="Re-enter your password" required
               autocomplete="new-password">
      </div>
      <button class="btn" type="submit" id="setBtn">
        <span class="spinner" id="spinner"></span>
        <span id="btnText">Set password &amp; sign in</span>
      </button>
      <div class="msg error"   id="errorMsg"></div>
      <div class="msg success" id="successMsg"></div>
    </form>
  </div>

  <div id="invalidWrap" style="display:none">
    <div class="invalid-state">
      <p>This link has expired or already been used.<br>Ask your Tom &amp; Co account manager to send you a new invite link.</p>
      <a href="/login.html">← Go to sign in</a>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script>
var oobCode = new URLSearchParams(window.location.search).get('oobCode');

if (!oobCode) {
  document.getElementById('formWrap').style.display   = 'none';
  document.getElementById('invalidWrap').style.display = 'block';
}

fetch('/api/config').then(function(r){ return r.json(); }).then(function(cfg) {
  firebase.initializeApp(cfg);
  var auth = firebase.auth();

  // Verify the code is still valid before showing the form
  if (oobCode) {
    auth.verifyPasswordResetCode(oobCode).catch(function() {
      document.getElementById('formWrap').style.display   = 'none';
      document.getElementById('invalidWrap').style.display = 'block';
    });
  }

  document.getElementById('setPasswordForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    var password = document.getElementById('password').value;
    var confirm  = document.getElementById('confirm').value;
    var errEl    = document.getElementById('errorMsg');
    var sucEl    = document.getElementById('successMsg');
    var btn      = document.getElementById('setBtn');
    var spinner  = document.getElementById('spinner');
    var btnText  = document.getElementById('btnText');

    errEl.style.display = 'none';
    sucEl.style.display = 'none';

    if (password.length < 8) {
      errEl.textContent   = 'Password must be at least 8 characters.';
      errEl.style.display = 'block';
      return;
    }
    if (password !== confirm) {
      errEl.textContent   = 'Passwords do not match.';
      errEl.style.display = 'block';
      return;
    }

    btn.disabled         = true;
    spinner.style.display = 'block';
    btnText.textContent  = 'Setting password…';

    try {
      // Confirm the password reset with the oobCode
      await auth.confirmPasswordReset(oobCode, password);

      // Get the email from the code so we can sign them straight in
      var email = await auth.verifyPasswordResetCode(oobCode).catch(function() { return null; });

      sucEl.textContent   = 'Password set! Signing you in…';
      sucEl.style.display = 'block';

      // Try to sign in automatically; fall back to login page
      try {
        if (email) await auth.signInWithEmailAndPassword(email, password);
        window.location.replace('/');
      } catch (_) {
        window.location.replace('/login.html');
      }
    } catch (err) {
      var msg = err.code === 'auth/expired-action-code' || err.code === 'auth/invalid-action-code'
        ? 'This link has expired. Ask your account manager for a new invite link.'
        : err.code === 'auth/weak-password'
        ? 'Password is too weak. Please choose a stronger password.'
        : 'Something went wrong. Please try again.';
      errEl.textContent    = msg;
      errEl.style.display  = 'block';
      btn.disabled         = false;
      spinner.style.display = 'none';
      btnText.textContent  = 'Set password & sign in';
    }
  });
});

function checkStrength() {
  var pw   = document.getElementById('password').value;
  var fill = document.getElementById('strengthFill');
  var score = 0;
  if (pw.length >= 8)  score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  var pct   = score / 5 * 100;
  var color = score <= 1 ? '#ef4444' : score <= 3 ? '#f59e0b' : '#10b981';
  fill.style.width      = pct + '%';
  fill.style.background = color;
}
</script>
</body>
</html>
